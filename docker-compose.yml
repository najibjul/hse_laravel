services:
  franken:
    build: .
    ports:
      - "443:443"
      - "5173:5173"
    volumes:
      - .:/app
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - ./docker/certs:/etc/caddy/certs
      - caddy_data:/data
      - caddy_config:/config
    restart: always
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: hse
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hse
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
  caddy_data:
  caddy_config:
